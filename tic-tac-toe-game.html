<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #333; font-family: Arial; }
        .container { text-align: center; }
        h1 { color: white; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; margin: 20px auto; }
        .cell { width: 100px; height: 100px; background: #fff; border: none; font-size: 24px; font-weight: bold; cursor: pointer; }
        .cell:hover { background: #f0f0f0; }
        #status { color: white; font-size: 20px; margin: 20px 0; }
        #restart { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div id="status">Your Turn (X)</div>
        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <button id="restart" onclick="location.reload()">Restart Game</button>
    </div>
    <script>
        let board = ['', '', '', '', '', '', '', '', ''];
        let currentPlayer = 'X';
        let gameActive = true;
        
        const winConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];
        
        const cells = document.querySelectorAll('.cell');
        const status = document.getElementById('status');
        
        cells.forEach(cell => {
            cell.addEventListener('click', () => {
                const index = cell.getAttribute('data-index');
                if (board[index] === '' && gameActive) {
                    board[index] = currentPlayer;
                    cell.textContent = currentPlayer;
                    
                    // Check win
                    let won = false;
                    winConditions.forEach(condition => {
                        if (board[condition[0]] === currentPlayer && board[condition[1]] === currentPlayer && board[condition[2]] === currentPlayer) {
                            status.textContent = currentPlayer + ' Wins!';
                            gameActive = false;
                            won = true;
                        }
                    });
                    
                    // Check draw
                    if (!won && !board.includes('')) {
                        status.textContent = 'Draw!';
                        gameActive = false;
                    }
                    
                    if (!won && gameActive) {
                        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                        status.textContent = currentPlayer === 'X' ? 'Your Turn (X)' : 'Computer Turn (O)';
                        
                        if (currentPlayer === 'O') {
                            setTimeout(computerMove, 500);
                        }
                    }
                }
            });
        });
        
        const computerMove = () => {
            let availableMoves = [];
            board.forEach((cell, index) => {
                if (cell === '') availableMoves.push(index);
            });
            const randomIndex = availableMoves[Math.floor(Math.random() * availableMoves.length)];
            board[randomIndex] = 'O';
            cells[randomIndex].textContent = 'O';
            
            let won = false;
            winConditions.forEach(condition => {
                if (board[condition[0]] === 'O' && board[condition[1]] === 'O' && board[condition[2]] === 'O') {
                    status.textContent = 'Computer (O) Wins!';
                    gameActive = false;
                    won = true;
                }
            });
            
            if (!won && !board.includes('')) {
                status.textContent = 'Draw!';
                gameActive = false;
            }
            
            if (!won && gameActive) {
                currentPlayer = 'X';
                status.textContent = 'Your Turn (X)';
            }
        };
    </script>
</body>
</html>
